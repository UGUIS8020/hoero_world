{% extends "common/base.html" %}
{% block title %}臨床模型上での適合 | 渋谷歯科技工所{% endblock %}
{% block description %}保険臨床ケースのメタルクラウン適合の記録です。{% endblock %}

{% block content %}
<div class="row">
  <div class="col-md-10 mx-auto">

    <nav aria-label="ページナビ" class="mb-3">
      <a href="{{ url_for('hoero.kennma') }}" class="btn btn-sm btn-outline-secondary">← 前へ：調整・研磨</a>
      <a href="{{ url_for('main.index') }}" class="btn btn-sm btn-outline-secondary float-end">一覧へ戻る →</a>
    </nav>

    <div class="card shadow">
      <div class="card-header bg-dark text-white text-center py-3">
        <h1 class="h3 mb-0">臨床模型上での適合</h1>
      </div>
      <div class="card-body hoero-card-body p-4" style="background-color: #666699;">

        <h2 class="h5 mb-4">保険臨床ケースの適合</h2>

        <div class="row g-3">
          {% for i in range(1, 12) %}
          <div class="col-6 col-md-4 text-center">
            <img src="{{ url_for('static', filename='hoero/tekigo/%03d.jpg' % i) }}" class="img-fluid rounded">
          </div>
          {% endfor %}
        </div>

      </div>
    </div>

    <div class="mt-3 d-flex justify-content-between">
      <a href="{{ url_for('hoero.kennma') }}" class="btn btn-outline-secondary">← 前へ：調整・研磨</a>
      <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">一覧へ戻る →</a>
    </div>

  </div>
</div>
{% endblock %}
