{% extends "common/base.html" %}
{% block title %}歯科医院メニュー | 渋谷歯科技工所{% endblock %}
{% block content %}

<div class="container py-5" style="max-width: 600px;">
  <h2 class="mb-4 text-center fw-bold">歯科医院メニュー</h2>

  <div class="d-grid gap-3">

    <a href="{{ url_for('main.prescription') }}" class="text-decoration-none">
      <div class="card shadow-sm border-warning">
        <div class="card-body d-flex align-items-center p-4">
          <span style="font-size: 2rem; margin-right: 1rem;">📋</span>
          <div>
            <div class="fw-bold fs-5">新規指示書</div>
            <div class="text-muted small">新しい技工指示書を作成します</div>
          </div>
        </div>
      </div>
    </a>

    <a href="{{ url_for('main.prescription_list') }}" class="text-decoration-none">
      <div class="card shadow-sm border-primary">
        <div class="card-body d-flex align-items-center p-4">
          <span style="font-size: 2rem; margin-right: 1rem;">📂</span>
          <div>
            <div class="fw-bold fs-5">作成済み指示書</div>
            <div class="text-muted small">過去に送信した指示書を確認します</div>
          </div>
        </div>
      </div>
    </a>

    <a href="{{ url_for('users.account_me') }}" class="text-decoration-none">
      <div class="card shadow-sm border-secondary">
        <div class="card-body d-flex align-items-center p-4">
          <span style="font-size: 2rem; margin-right: 1rem;">⚙️</span>
          <div>
            <div class="fw-bold fs-5">アカウント</div>
            <div class="text-muted small">担当医師の管理・アカウント情報の変更</div>
          </div>
        </div>
      </div>
    </a>

  </div>
</div>

{% endblock %}
